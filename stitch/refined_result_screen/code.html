<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apex Pack Tracker - Results</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed": "#1a1b1f",
                        "tertiary-fixed": "#e3e2e7",
                        "on-secondary-fixed-variant": "#604100",
                        "secondary": "#ffd799",
                        "surface-tint": "#ffb3ad",
                        "inverse-on-surface": "#313030",
                        "secondary-fixed-dim": "#ffba38",
                        "surface-container-low": "#1c1b1b",
                        "on-surface-variant": "#e4bdba",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#281900",
                        "primary-fixed": "#ffdad6",
                        "on-tertiary": "#2f3034",
                        "inverse-primary": "#bb161f",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#46464b",
                        "surface-container-high": "#2a2a2a",
                        "surface-variant": "#353534",
                        "error-container": "#93000a",
                        "surface-dim": "#131313",
                        "secondary-container": "#feb300",
                        "on-primary-fixed": "#410003",
                        "on-primary-fixed-variant": "#930010",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "on-secondary": "#432c00",
                        "outline-variant": "#5b403d",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary-fixed": "#ffdeac",
                        "background": "#131313",
                        "surface-container-highest": "#353534",
                        "tertiary-fixed-dim": "#c6c6cb",
                        "inverse-surface": "#e5e2e1",
                        "primary-container": "#ff544e",
                        "on-secondary-container": "#6a4800",
                        "error": "#ffb4ab",
                        "surface": "#131313",
                        "surface-bright": "#393939",
                        "tertiary": "#c6c6cb",
                        "on-tertiary-container": "#282a2e",
                        "on-primary": "#680008",
                        "primary": "#ffb3ad",
                        "on-primary-container": "#5c0006",
                        "primary-fixed-dim": "#ffb3ad",
                        "outline": "#ab8885",
                        "surface-container": "#201f1f",
                        "tertiary-container": "#909095"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hud-scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 179, 173, 0.02) 50%);
            background-size: 100% 4px;
        }
        .hex-bg {
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen max-w-[390px] mx-auto overflow-x-hidden hud-scanline relative bg-background">
<!-- TopAppBar -->
<header class="fixed top-0 w-[390px] z-50 bg-[#131313]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 border-b border-white/5">
<button class="hover:bg-[#393939] transition-colors active:scale-95 duration-200 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h1 class="font-headline uppercase tracking-[0.2em] text-xs text-primary font-bold">OPERATIONAL RESULTS</h1>
<button class="hover:bg-[#393939] transition-colors active:scale-95 duration-200 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">history</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 pt-20 pb-40 px-6">
<!-- Main Stats Group -->
<div class="space-y-6">
<!-- Circular Progress Card -->
<div class="relative bg-surface-container rounded-2xl p-8 flex flex-col items-center overflow-hidden border border-white/5 shadow-2xl">
<!-- Background decorative ring -->
<div class="absolute inset-0 border-[20px] border-primary/5 rounded-full scale-150 -translate-y-1/2 opacity-20 pointer-events-none"></div>
<div class="relative w-44 h-44 flex items-center justify-center">
<!-- Progress Circle -->
<svg class="absolute inset-0 w-full h-full -rotate-90 drop-shadow-[0_0_15px_rgba(255,179,173,0.3)]">
<circle cx="88" cy="88" fill="transparent" r="80" stroke="rgba(255,179,173,0.1)" stroke-width="8"></circle>
<circle cx="88" cy="88" fill="transparent" r="80" stroke="url(#primaryGradient)" stroke-dasharray="502" stroke-dashoffset="256" stroke-linecap="round" stroke-width="8"></circle>
<defs>
<lineargradient id="primaryGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#ffb3ad"></stop>
<stop offset="100%" stop-color="#ff544e"></stop>
</lineargradient>
</defs>
</svg>
<div class="flex flex-col items-center text-center z-10">
<span class="font-headline text-5xl font-extrabold text-on-surface tracking-tighter">49%</span>
<span class="font-label text-[10px] uppercase tracking-[0.25em] text-primary/60 font-bold mt-1">COMPLETE</span>
</div>
</div>
<div class="mt-8 text-center space-y-1 relative z-10">
<p class="font-label uppercase tracking-widest text-[10px] text-primary/60 font-bold">CURRENT STATUS</p>
<p class="font-headline text-lg font-bold text-on-surface">"You’re getting close, Legend!"</p>
</div>
</div>
<!-- Detailed Metrics -->
<div class="grid grid-cols-1 gap-4">
<!-- Packs Opened -->
<div class="bg-surface-container-high rounded-xl p-5 border-l-4 border-primary flex justify-between items-center group active:scale-[0.98] transition-transform">
<div class="flex flex-col">
<span class="font-label uppercase text-[10px] tracking-wider text-primary/60 mb-1 font-bold">TOTAL PACKS OPENED</span>
<span class="font-headline text-3xl font-bold text-on-surface">245</span>
</div>
<div class="bg-primary/10 p-3 rounded-lg">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">package_2</span>
</div>
</div>
<!-- Packs Remaining -->
<div class="bg-surface-container-high rounded-xl p-5 border-l-4 border-secondary flex justify-between items-center group active:scale-[0.98] transition-transform">
<div class="flex flex-col">
<span class="font-label uppercase text-[10px] tracking-wider text-secondary/60 mb-1 font-bold">PACKS LEFT UNTIL 500</span>
<span class="font-headline text-3xl font-bold text-secondary">255</span>
</div>
<div class="bg-secondary/10 p-3 rounded-lg">
<span class="material-symbols-outlined text-secondary text-3xl">hourglass_empty</span>
</div>
</div>
</div>
<!-- Secondary Metrics Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-4 rounded-xl border border-white/5 flex flex-col">
<span class="font-label text-[9px] uppercase tracking-[0.15em] text-outline/80 font-bold mb-1">ACCOUNT LEVEL</span>
<div class="font-headline text-xl font-bold text-on-surface">LVL 412</div>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl border border-white/5 flex flex-col">
<span class="font-label text-[9px] uppercase tracking-[0.15em] text-outline/80 font-bold mb-1">EST. PROBABILITY</span>
<div class="font-headline text-xl font-bold text-primary">0.2%</div>
</div>
</div>
</div>
</main>
<!-- Bottom Actions & Navigation Container -->
<div class="fixed bottom-0 w-[390px] z-50">
<!-- Action Buttons -->
<div class="px-6 pb-6 pt-4 bg-gradient-to-t from-[#131313] via-[#131313] to-transparent space-y-3">
<button class="w-full bg-primary text-on-primary font-headline font-bold uppercase tracking-[0.15em] py-4 rounded-xl shadow-[0_8px_20px_-4px_rgba(255,84,78,0.4)] active:scale-[0.97] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">save</span>
                SAVE PROGRESS
            </button>
<button class="w-full bg-surface-container-highest border border-outline-variant text-on-surface font-headline font-bold uppercase tracking-[0.15em] py-4 rounded-xl active:scale-[0.97] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-xl">refresh</span>
                RECALCULATE
            </button>
</div>
<!-- BottomNavBar -->
<nav class="bg-[#131313]/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center h-20 pb-2 px-4">
<div class="flex flex-col items-center justify-center text-outline-variant/60 px-4 py-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined">home</span>
<span class="font-label uppercase tracking-widest text-[9px] font-bold mt-1">HOME</span>
</div>
<div class="flex flex-col items-center justify-center text-outline-variant/60 px-4 py-2 hover:text-primary transition-colors">
<span class="material-symbols-outlined">calculate</span>
<span class="font-label uppercase tracking-widest text-[9px] font-bold mt-1">TRACKER</span>
</div>
<div class="flex flex-col items-center justify-center text-primary relative px-4 py-2">
<div class="absolute -top-1 w-12 h-1 bg-primary rounded-full shadow-[0_0_10px_rgba(255,179,173,0.8)]"></div>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-label uppercase tracking-widest text-[9px] font-bold mt-1">RESULTS</span>
</div>
</nav>
</div>
<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/2 -right-20 w-80 h-80 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-0 -left-20 w-80 h-80 bg-secondary/5 rounded-full blur-[100px]"></div>
<img class="absolute top-1/4 -right-10 w-64 rotate-12 opacity-[0.03] grayscale brightness-200" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEnAnhXmuqGonsPaM74O1B0fdTctWxCzcAJWepoKEEkYbBuOivCWXYCi-85Kfix8tBBm8ynuBfxzA7xTyf_r9p2IQgf9BSVFpgMeWjiyndhh0TxOcNrPDdLbqcPfV7U7JC8MamHxpG7I9Fz72_5ZdyAFUrr0Jv1dfb7b98pSehnKAbp55yodDZ4805S1NZ50ifocujsyXlzyrimBFyF127MU_8top8CrhR9nmZCKrU_CWISJkdBVUUFks5K-sBgh8NqpQL279v4geJ"/>
</div>
</body></html>
